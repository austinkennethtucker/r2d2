name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh

      - name: ShellCheck
        run: shellcheck r2d2.sh install.sh

      - name: Parse Zsh wrapper
        run: zsh -n r2d2.zsh

  smoke:
    name: Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install zsh on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Smoke test Bash sourcing
        run: bash -lc 'source ./r2d2.sh && r2d2 --clone --help >/dev/null'

      - name: Smoke test Zsh sourcing
        run: zsh -fc 'source ./r2d2.zsh && r2d2 --clone --help >/dev/null'
